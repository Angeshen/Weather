<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Kalshi Weather Bot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0f1117; --surface: #1a1d27; --surface2: #232733;
            --border: #2d3140; --text: #e4e6ed; --text-dim: #8b8fa3;
            --accent: #6c5ce7; --green: #00d68f; --red: #ff6b6b;
            --cyan: #74b9ff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .login-box {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 40px; width: 360px; text-align: center;
        }
        .login-box h1 { font-size: 22px; margin-bottom: 6px; }
        .login-box h1 span { color: var(--cyan); }
        .login-box .subtitle { color: var(--text-dim); font-size: 13px; margin-bottom: 28px; }
        .login-box input[type="password"] {
            width: 100%; padding: 12px 14px; border: 1px solid var(--border);
            border-radius: 8px; background: var(--surface2); color: var(--text);
            font-size: 15px; outline: none; margin-bottom: 16px;
        }
        .login-box input[type="password"]:focus { border-color: var(--accent); }
        .login-box button {
            width: 100%; padding: 12px; border: none; border-radius: 8px;
            background: var(--accent); color: #fff; font-size: 15px;
            font-weight: 600; cursor: pointer; transition: opacity 0.2s;
        }
        .login-box button:hover { opacity: 0.85; }
        .error { color: var(--red); font-size: 13px; margin-bottom: 14px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>&#9881; <span>Kalshi Weather Bot</span></h1>
        <div class="subtitle">Enter password to access the dashboard</div>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="POST">
            <input type="password" name="password" placeholder="Password" autofocus>
            <button type="submit">Log In</button>
        </form>
    </div>
</body>
</html>
